// KSPBridge runtime configuration.
//
// This file is loaded by the plugin at startup. If missing or unparseable,
// the plugin will fall back to the defaults baked into Settings.cs and log
// a warning to Player.log.
//
// The node name KSPBRIDGE is significant — the plugin searches for it
// specifically. Wrap all settings inside it.
KSPBRIDGE
{
    // Hostname or IP of the Mosquitto MQTT broker that will receive telemetry.
    // The default 'localhost' assumes you have mosquitto running on the same
    // machine as KSP - the most common setup. For a remote broker (homelab,
    // VM, cloud) replace with the broker's hostname or IP. Use an IP literal
    // if mDNS (.local) names don't resolve on this machine.
    broker_host = localhost

    // MQTT TCP port. Standard mosquitto installs listen on 1883 for raw MQTT.
    // The FDO browser console expects a separate WebSocket listener on 9002;
    // see README's "Browser console" section for the mosquitto.conf snippet
    // that adds it.
    broker_port = 1883

    // All published topics are prefixed with this string, e.g.:
    //   ksp/telemetry/orbit
    //   ksp/telemetry/attitude
    // Keep it distinct from ksa/telemetry (used by KSA-Bridge) so subscribers
    // can tell which game the data comes from.
    topic_prefix = ksp/telemetry

    // MQTT client ID used when connecting to the broker. Must be unique among
    // all clients currently connected; the broker will kick duplicates.
    client_id = kspbridge
}
