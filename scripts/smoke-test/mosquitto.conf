# KSPBridge smoke-test mosquitto config.
#
# Runs in user mode on ports that DELIBERATELY don't conflict with
# any default mosquitto install:
#
#   1885   - MQTT TCP   (instead of the standard 1883)
#   9003   - WebSocket  (instead of the typical 9001 / 9002)
#
# Why alternate ports? Most Windows mosquitto installs run as a
# Windows service occupying 1883. Modifying that service's config
# requires admin elevation and a service restart. By running our
# own user-mode broker on alternate ports, the smoke test needs
# zero admin privileges - the system service keeps running on
# 1883 and our test broker runs on 1885 alongside it.
#
# The smoke test edits the deployed KSPBridge Settings.cfg to
# point at localhost:1885, and the FDO console URL includes
# ?broker=ws://localhost:9003 to override its default.
#
# Run with:
#   "C:\Program Files\mosquitto\mosquitto.exe" -c scripts\smoke-test\mosquitto.conf -v
#
# The -v flag turns on verbose logging so you can watch publishes
# arrive in real time, useful for diagnosing producer issues.

# MQTT over TCP for the plugin's wire connection.
listener 1885
protocol mqtt
allow_anonymous true

# WebSocket listener for the in-browser FDO console.
listener 9003
protocol websockets
allow_anonymous true

# Smoke testing is ephemeral - no need to persist messages between
# test runs. Disabling persistence keeps the broker's footprint to
# RAM only and means a second test run starts from a clean state.
persistence false
